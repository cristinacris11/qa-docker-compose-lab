services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_pass
      POSTGRES_DB: qa_db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

healthcheck:
      test: ["CMD", "pg_isready", "-U", "qa_user"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  cache:
    image: redis:7-alpine

  adminer:
    image: adminer:latest
    ports:
      - "8888:8080"

depends_on:
      db:
        condition: service_healthy

volumes:
  db-data: