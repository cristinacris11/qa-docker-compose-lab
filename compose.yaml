services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_pass
      POSTGRES_DB: qa_db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine

  adminer:
    image: adminer:latest
    ports:
      - "8888:8080"

volumes:
  db-data: